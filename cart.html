<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LFG - Your Bag</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --yellow: #f5c518; --black: #0a0a0a; --dark: #111111; --border: #1e1e1e; --grey: #999; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--black); color: #f5f5f5; font-family: 'Space Mono', monospace; min-height: 100vh; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--black); z-index: 100; }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: #f5f5f5; text-decoration: none; }
    .nav-logo span { color: var(--yellow); }
    .nav-cart { background: var(--yellow); color: var(--black); border: none; padding: 10px 20px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
    .page { max-width: 520px; margin: 0 auto; padding: 36px 24px 80px; }
    .cart-header { display: flex; align-items: center; gap: 16px; margin-bottom: 36px; }
    .back-btn { background: transparent; border: 1px solid #333; color: #f5f5f5; padding: 9px 16px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; cursor: pointer; text-decoration: none; display: inline-block; }
    .back-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    .cart-title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 5px; }
    .section-label { font-size: 10px; letter-spacing: 3px; color: var(--yellow); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    #cart-items { margin-bottom: 24px; }
    .cart-item { display: flex; align-items: center; gap: 14px; padding: 16px; background: var(--dark); border: 1px solid var(--border); margin-bottom: 10px; }
    .item-info { flex: 1; }
    .item-name { font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
    .item-price { font-size: 11px; color: var(--yellow); }
    .qty-controls { display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .qty-btn { background: #1e1e1e; border: none; color: #f5f5f5; width: 26px; height: 26px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-btn:hover { background: var(--yellow); color: var(--black); }
    .remove-btn { background: transparent; border: none; color: #444; font-size: 16px; cursor: pointer; padding: 4px 6px; }
    .remove-btn:hover { color: #ff4444; }
    .empty-state { text-align: center; padding: 70px 0; color: #444; }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-text { font-size: 11px; letter-spacing: 3px; margin-bottom: 28px; }
    .shop-btn { display: inline-block; background: var(--yellow); color: var(--black); padding: 14px 28px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-decoration: none; }
    #cart-summary { display: none; }
    .summary-box { background: var(--dark); border: 1px solid var(--border); padding: 20px; margin-bottom: 14px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 1px; color: var(--grey); margin-bottom: 10px; }
    .summary-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .summary-total { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; letter-spacing: 2px; }
    .summary-total span:last-child { color: var(--yellow); }
    .checkout-btn { width: 100%; background: var(--yellow); color: var(--black); border: none; padding: 18px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 3px; cursor: pointer; }
    .checkout-btn:hover { background: #e6b800; }
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #ff4444; color: #fff; padding: 11px 22px; font-size: 11px; letter-spacing: 2px; font-weight: 700; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">L<span>F</span>G</a>
    <button class="nav-cart" onclick="window.location.href='cart.html'">
      BAG (<span id="cart-count">0</span>)
    </button>
  </nav>

  <div class="page">
    <div class="cart-header">
      <a href="index.html" class="back-btn">&larr; BACK</a>
      <div class="cart-title">YOUR BAG</div>
    </div>

    <p class="section-label">ITEMS</p>
    <div id="cart-items"></div>

    <div id="cart-summary">
      <p class="section-label">ORDER SUMMARY</p>
      <div class="summary-box">
        <div class="summary-row"><span>SUBTOTAL</span><span id="subtotal">GH&#8373; 0</span></div>
        <div class="summary-row"><span>SHIPPING</span><span>CALCULATED AT CHECKOUT</span></div>
        <hr class="summary-divider"/>
        <div class="summary-total"><span>TOTAL</span><span id="total">GH&#8373; 0</span></div>
      </div>
      <button class="checkout-btn" onclick="alert('Checkout coming soon!')">CHECKOUT</button>
    </div>
  </div>

  <div id="toast">ITEM REMOVED</div>

  <script src="cart.js"></script>
  <script>
    function renderCart() {
      var cart = JSON.parse(localStorage.getItem("lfg-cart") || "[]");
      var container = document.getElementById("cart-items");
      var summary = document.getElementById("cart-summary");
      container.innerHTML = "";

      if (cart.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">🛍️</div><p class="empty-text">YOUR BAG IS EMPTY</p><a href="index.html" class="shop-btn">SHOP NEW DROP</a></div>';
        summary.style.display = "none";
        return;
      }

      for (var i = 0; i < cart.length; i++) {
        var item = cart[i];
        var div = document.createElement("div");
        div.className = "cart-item";
        var imgTag = item.image ? '<img src="' + item.image + '" style="width:70px;height:70px;object-fit:cover;flex-shrink:0;" />' : '';
        div.innerHTML = imgTag +
          '<div class="item-info">' +
            '<div class="item-name">' + item.name + '</div>' +
            '<div class="item-price">GH&#8373; ' + (item.price * item.qty) + '</div>' +
          '</div>' +
          '<div class="qty-controls">' +
            '<button class="qty-btn" onclick="changeQty(' + i + ', -1)">-</button>' +
            '<span>' + item.qty + '</span>' +
            '<button class="qty-btn" onclick="changeQty(' + i + ', 1)">+</button>' +
          '</div>' +
          '<button class="remove-btn" onclick="removeItem(' + i + ')">X</button>';
        container.appendChild(div);
      }

      var subtotal = 0;
      for (var j = 0; j < cart.length; j++) { subtotal += cart[j].price * cart[j].qty; }
      document.getElementById("subtotal").textContent = "GH" + String.fromCharCode(8373) + " " + subtotal;
      document.getElementById("total").textContent = "GH" + String.fromCharCode(8373) + " " + subtotal;
      summary.style.display = "block";
      updateCartCount();
    }

    function changeQty(index, delta) {
      var cart = JSON.parse(localStorage.getItem("lfg-cart") || "[]");
      cart[index].qty += delta;
      if (cart[index].qty <= 0) cart.splice(index, 1);
      localStorage.setItem("lfg-cart", JSON.stringify(cart));
      renderCart();
    }

    function removeItem(index) {
      var cart = JSON.parse(localStorage.getItem("lfg-cart") || "[]");
      cart.splice(index, 1);
      localStorage.setItem("lfg-cart", JSON.stringify(cart));
      renderCart();
      var toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(function() { toast.classList.remove("show"); }, 2000);
    }

    renderCart();
  </script>

</body>
</html>
